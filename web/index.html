<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MarkdownHub</title>
    <style>
      /* 光标同步高亮动画 #667eea */
      @keyframes cursor-highlight {
        0%, 100% {
          outline: 3px solid rgba(255, 223, 0, 0);
          outline-offset: 2px;
        }
        10%, 90% {
          outline: 3px solid rgba(102, 126, 234, 0.8);
          outline-offset: 2px;
        }
      }

      .cursor-highlight {
        animation: cursor-highlight 1s ease-in-out;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // 编辑器光标与预览窗口同步滚动
      function setupCursorSync() {
        let textarea = null;
        let preview = null;
        let lastHighlightedElement = null;
        let pendingHighlightTimer = null;

        const clearLastHighlight = () => {
          if (lastHighlightedElement) {
            lastHighlightedElement.classList.remove('cursor-highlight');
            lastHighlightedElement = null;
          }
          if (pendingHighlightTimer) {
            clearTimeout(pendingHighlightTimer);
            pendingHighlightTimer = null;
          }
        };

        const syncScroll = () => {
          if (!textarea || !preview) return;

          const cursorPos = textarea.selectionStart;
          const textBeforeCursor = textarea.value.substring(0, cursorPos);
          const lineNumber = textBeforeCursor.split('\n').length;

          const elements = preview.querySelectorAll('[data-line-end]');
          for (const el of elements) {
            const lineEnd = parseInt(el.getAttribute('data-line-end') || '0', 10);
            if (lineEnd >= lineNumber) {
              // 只有当目标元素变化时才高亮和滚动
              if (el !== lastHighlightedElement) {
                el.scrollIntoView({ behavior: 'auto', block: 'center' });

                // 移除之前元素的高亮
                clearLastHighlight();

                // 添加高亮动画
                el.classList.add('cursor-highlight');
                lastHighlightedElement = el;

                // 动画结束后移除类（以便下次可以重新触发）
                pendingHighlightTimer = setTimeout(() => {
                  el.classList.remove('cursor-highlight');
                  if (lastHighlightedElement === el) {
                    lastHighlightedElement = null;
                  }
                  pendingHighlightTimer = null;
                }, 1000);
              }
              break;
            }
          }
        };

        const unbind = () => {
          if (!textarea) return;
          textarea.removeEventListener('click', syncScroll);
          textarea.removeEventListener('keyup', syncScroll);
          textarea.removeEventListener('input', syncScroll);
          textarea.removeEventListener('select', syncScroll);
        };

        const bindToCurrentNodes = () => {
          const nextTextarea = document.querySelector('textarea.editor-textarea');
          const nextPreview = document.querySelector('.markdown-preview');

          if (nextTextarea === textarea && nextPreview === preview) {
            return;
          }

          unbind();
          clearLastHighlight();

          textarea = nextTextarea;
          preview = nextPreview;

          if (!textarea || !preview) {
            return;
          }

          textarea.addEventListener('click', syncScroll);
          textarea.addEventListener('keyup', syncScroll);
          textarea.addEventListener('input', syncScroll);
          textarea.addEventListener('select', syncScroll);
          syncScroll();
        };

        const observer = new MutationObserver(() => {
          bindToCurrentNodes();
        });

        observer.observe(document.body, {
          childList: true,
          subtree: true,
        });

        bindToCurrentNodes();
      }

      setTimeout(setupCursorSync, 2000);
    </script>
  </body>
</html>
