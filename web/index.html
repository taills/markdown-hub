<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MarkdownHub</title>
    <style>
      /* 光标同步高亮动画 */
      @keyframes cursor-highlight {
        0%, 100% {
          outline: 3px solid rgba(255, 223, 0, 0);
          outline-offset: 2px;
        }
        10%, 90% {
          outline: 3px solid rgba(255, 223, 0, 0.8);
          outline-offset: 2px;
        }
      }

      .cursor-highlight {
        animation: cursor-highlight 1s ease-in-out;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // 编辑器光标与预览窗口同步滚动
      function setupCursorSync() {
        const textarea = document.querySelector('textarea.editor-textarea');
        const preview = document.querySelector('.markdown-preview');

        if (!textarea || !preview) {
          setTimeout(setupCursorSync, 500);
          return;
        }

        let lastHighlightedElement = null;

        const syncScroll = () => {
          const cursorPos = textarea.selectionStart;
          const textBeforeCursor = textarea.value.substring(0, cursorPos);
          const lineNumber = textBeforeCursor.split('\n').length;

          const elements = preview.querySelectorAll('[data-line-end]');
          for (const el of elements) {
            const lineEnd = parseInt(el.getAttribute('data-line-end') || '0', 10);
            if (lineEnd >= lineNumber) {
              // 只有当目标元素变化时才高亮和滚动
              if (el !== lastHighlightedElement) {
                el.scrollIntoView({ behavior: 'auto', block: 'center' });

                // 移除之前元素的高亮
                if (lastHighlightedElement) {
                  lastHighlightedElement.classList.remove('cursor-highlight');
                }

                // 添加高亮动画
                el.classList.add('cursor-highlight');
                lastHighlightedElement = el;

                // 动画结束后移除类（以便下次可以重新触发）
                setTimeout(() => {
                  el.classList.remove('cursor-highlight');
                }, 1000);
              }
              break;
            }
          }
        };

        textarea.addEventListener('click', syncScroll);
        textarea.addEventListener('keyup', syncScroll);
      }

      setTimeout(setupCursorSync, 2000);
    </script>
  </body>
</html>
